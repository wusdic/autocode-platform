<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocode 控制台</title>
<style>
  :root { --bg:#0f1115; --panel:#1a1d24; --fg:#e6e6e6; --mut:#8a90a0; --acc:#4f8cff; --bad:#ff5d5d; --ok:#3ecf8e; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:10px 16px; background:var(--panel); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; }
  input,button,select,textarea { font:inherit; background:#11141a; color:var(--fg); border:1px solid #2a2f3a; border-radius:6px; padding:6px 10px; }
  textarea { resize:vertical; }
  button { cursor:pointer; }
  button:hover { border-color:var(--acc); }
  main { display:grid; grid-template-columns:260px 1fr; gap:0; height:calc(100vh - 52px); }
  aside { background:var(--panel); border-right:1px solid #2a2f3a; overflow:auto; padding:8px; }
  section { overflow:auto; padding:16px; }
  .proj { padding:8px; border-radius:6px; cursor:pointer; border:1px solid transparent; }
  .proj:hover { background:#222631; }
  .proj.active { border-color:var(--acc); background:#222631; }
  .badge { font-size:11px; color:var(--mut); }
  .tabs { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .tabs button.active { border-color:var(--acc); color:var(--acc); }
  pre { background:#0b0d12; border:1px solid #2a2f3a; border-radius:6px; padding:12px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
  .row { display:flex; gap:8px; align-items:center; margin:6px 0; }
  .mut { color:var(--mut); }
  .err { color:var(--bad); }
  .ok { color:var(--ok); }
  ul { padding-left:18px; }
  li { cursor:pointer; }
  li:hover { color:var(--acc); }
</style>
</head>
<body>
<header>
  <h1>Autocode 控制台</h1>
  <input id="token" type="password" placeholder="X-Token" size="22">
  <button id="connect">连接</button>
  <button id="newproj" title="新业务请新建独立项目（一个项目=一个核心需求）">+ 新建项目</button>
  <span id="status" class="mut">未连接</span>
</header>
<main>
  <aside><div id="projects" class="mut">（先填 token 连接）</div></aside>
  <section>
    <div class="tabs">
      <button data-tab="state" class="active">状态/交付</button>
      <button data-tab="board">进度看板</button>
      <button data-tab="audit">事件</button>
      <button data-tab="artifacts">产物</button>
      <button data-tab="chat">对话</button>
    </div>
    <div id="view"><p class="mut">选择左侧项目。</p></div>
  </section>
</main>
<script>
"use strict";
// 安全要点：① token 存 sessionStorage（关页即失效，比 localStorage 难被长期窃取）；
//          ② 所有来自 API / AI 产物的文本一律 textContent / 转义后插入，绝不 innerHTML 原文；
//          ③ Markdown/产物用 <pre> 原样展示（textContent），不解析 HTML —— 从根上杜绝存储型 XSS。
const $ = (s, r=document) => r.querySelector(s);
const state = { token:"", pid:null, tab:"state", _timer:null, _nav:0 };

// 流水线阶段顺序（与后端 state.stage 一致）：用于进度条高亮"当前推进到哪一步"。
const STAGES = ["created","product","architecture","development","qa","release","complete"];
const STAGE_LABEL = { created:"建项目", product:"产品设计", architecture:"架构",
  development:"开发", qa:"测试", release:"发布", complete:"完成" };
// 看板状态 → 颜色（done 绿 / 阻塞失败 红 / 进行中 蓝 / 其它灰），与 :root 变量同源。
const STATUS_COLOR = { done:"#3ecf8e", complete:"#3ecf8e", blocked:"#ff5d5d",
  failed:"#ff5d5d", in_progress:"#7db4ff", running:"#7db4ff", ready:"#e6e6e6",
  todo:"#8a90a0", backlog:"#8a90a0" };

// 切换 Tab 的【唯一】入口：同时更新 state.tab、按钮高亮、视图——避免"程序切 tab 但高亮没动"的不一致。
function switchTab(name){
  state.tab = name;
  for (const b of document.querySelectorAll(".tabs button"))
    b.classList.toggle("active", b.dataset.tab === name);
  render();
}

async function api(path, method="GET", body=null){
  const opts = { method, headers: { "X-Token": state.token } };
  if (body != null) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (r.status === 401) throw new Error("token 无效 (401)");
  if (!r.ok) {
    let d = ""; try { d = (await r.json()).detail || ""; } catch (e) {}
    throw new Error(path + " → " + r.status + (d ? ": " + d : ""));
  }
  return r.json();
}

async function loadProjects(){
  try {
    const d = await api("/api/projects");
    $("#status").textContent = "已连接"; $("#status").className = "ok";
    const box = $("#projects"); box.innerHTML = "";
    if (!d.projects.length) { box.textContent = "（暂无项目）"; box.className = "mut"; return; }
    for (const p of d.projects) {
      const el = document.createElement("div");
      el.className = "proj" + (p.project_id === state.pid ? " active" : "");
      // textContent：项目名/阶段即便含 < > 也不会被解析
      const t = document.createElement("div"); t.textContent = p.project_id;
      const b = document.createElement("div"); b.className = "badge";
      b.textContent = "stage: " + p.stage + " · tasks: " + p.total_tasks;
      el.appendChild(t); el.appendChild(b);
      el.onclick = () => { state.pid = p.project_id; render(); loadProjects(); };
      box.appendChild(el);
    }
  } catch (e) {
    $("#status").textContent = e.message; $("#status").className = "err";
  }
}

async function render(){
  stopAutoRefresh();   // 切 tab/换项目先停掉旧的定时刷新，避免多个看板轮询叠加
  const nav = ++state._nav;   // 本次渲染序号：异步返回后若已切走（nav 变了），丢弃过期写入
  const v = $("#view");
  if (!state.pid) { v.innerHTML = '<p class="mut">选择左侧项目。</p>'; return; }
  v.textContent = "加载中…";
  try {
    if (state.tab === "state") {
      await renderState(v, nav);
    } else if (state.tab === "board") {
      await renderBoard(v, nav);
    } else if (state.tab === "audit") {
      await renderAudit(v, nav);
    } else if (state.tab === "artifacts") {
      const d = await api("/api/projects/" + encodeURIComponent(state.pid) + "/artifacts");
      if (state._nav !== nav) return;   // 已切走：别用过期产物列表盖掉新页面
      v.innerHTML = "<p class='mut'>点击查看（原样文本展示，不解析 HTML）：</p>";
      const ul = document.createElement("ul");
      for (const a of d.artifacts) {
        const li = document.createElement("li");
        li.textContent = a.path + "  (" + a.size + "B)";
        li.onclick = () => viewArtifact(a.path);
        ul.appendChild(li);
      }
      v.appendChild(ul);
      const out = document.createElement("pre"); out.id = "artifactOut"; v.appendChild(out);
    } else if (state.tab === "chat") {
      await renderChat(v);
    }
  } catch (e) {
    if (state._nav !== nav) return;   // 过期请求的报错也别盖掉新页面
    v.innerHTML = ""; const p = document.createElement("p"); p.className = "err";
    p.textContent = e.message; v.appendChild(p);
  }
}

async function viewArtifact(path){
  const out = $("#artifactOut"); if (!out) return;
  out.textContent = "加载中…";
  try {
    const d = await api("/api/projects/" + encodeURIComponent(state.pid)
      + "/artifact-content?path=" + encodeURIComponent(path));
    out.textContent = d.binary ? "(二进制文件，不展示)"
      : (d.content + (d.truncated ? "\n…(已截断)" : ""));   // textContent：AI 产物原样，不当 HTML
  } catch (e) { out.textContent = e.message; }
}

// 自动刷新：仅在页面可见时轮询（visibilityState），离开 tab/项目时由 render() 统一 stop。
function startAutoRefresh(fn){
  stopAutoRefresh();
  state._timer = setInterval(() => {
    if (document.visibilityState === "visible") fn();
  }, 5000);
}
function stopAutoRefresh(){
  if (state._timer) { clearInterval(state._timer); state._timer = null; }
}

// 进度条：一行小方块，按 STAGES 顺序高亮"已完成/当前/未到"三态。
function pipelineBar(curStage){
  const idx = STAGES.indexOf(curStage);
  const wrap = document.createElement("div");
  wrap.className = "row"; wrap.style.flexWrap = "wrap";
  STAGES.forEach((s, i) => {
    const cell = document.createElement("span");
    const done = idx >= 0 && i < idx, cur = i === idx;
    cell.textContent = STAGE_LABEL[s] || s;
    cell.style.cssText = "padding:3px 9px;border-radius:12px;font-size:12px;border:1px solid "
      + (cur ? "#4f8cff" : done ? "#3ecf8e" : "#2a2f3a") + ";color:"
      + (cur ? "#bcd4ff" : done ? "#8af0c0" : "#8a90a0") + ";background:"
      + (cur ? "#16243d" : done ? "#13311f" : "transparent");
    wrap.appendChild(cell);
    if (i < STAGES.length - 1) {
      const sep = document.createElement("span");
      sep.textContent = "→"; sep.className = "mut"; sep.style.fontSize = "11px";
      wrap.appendChild(sep);
    }
  });
  return wrap;
}

// 状态/交付页：进度条 + 交付摘要（是否真正完成/启动命令）+ 设计产物勾选 + 变更请求入口。
async function renderState(v, nav){
  const [st, dl] = await Promise.all([
    api("/api/projects/" + encodeURIComponent(state.pid) + "/state"),
    api("/api/projects/" + encodeURIComponent(state.pid) + "/deliverable").catch(() => null),
  ]);
  if (nav != null && state._nav !== nav) return;   // 已切走：丢弃过期渲染
  v.innerHTML = "";
  const curStage = (st.state && st.state.stage) || "created";

  const h1 = document.createElement("div"); h1.className = "mut";
  h1.textContent = "流水线进度"; h1.style.margin = "2px 0 6px";
  v.appendChild(h1);
  v.appendChild(pipelineBar(curStage));

  // 交付摘要：is_done 必须四项皆满足（见后端 deliverable），这里给出明确"是否可交付"结论。
  if (dl) {
    const card = document.createElement("div");
    card.style.cssText = "margin:14px 0;padding:12px;border-radius:8px;border:1px solid "
      + (dl.is_done ? "#3ecf8e" : "#2a2f3a") + ";background:#0b0d12";
    const badge = document.createElement("div");
    badge.textContent = dl.is_done ? "✅ 已交付（可运行）" : "⏳ 进行中 / 尚未通过交付门";
    badge.style.cssText = "font-weight:600;color:" + (dl.is_done ? "#3ecf8e" : "#e6e6e6");
    card.appendChild(badge);
    const meta = document.createElement("div"); meta.className = "mut";
    meta.style.marginTop = "6px"; meta.style.fontSize = "12px";
    meta.textContent = "阶段：" + (dl.stage || "?")
      + "　·　QA 放行：" + fmtBool(dl.release_allowed)
      + "　·　完整性：" + fmtBool(dl.integrity_ok)
      + (dl.completion_mode ? "　·　完成方式：" + dl.completion_mode : "");
    card.appendChild(meta);
    if (dl.run_command) {
      const rc = document.createElement("div"); rc.style.marginTop = "8px";
      const lab = document.createElement("span"); lab.className = "mut";
      lab.textContent = "运行方式："; rc.appendChild(lab);
      const code = document.createElement("code");
      code.textContent = dl.run_command;   // textContent：清单内容原样，不解析
      code.style.cssText = "background:#11141a;padding:2px 6px;border-radius:4px;border:1px solid #2a2f3a";
      rc.appendChild(code); card.appendChild(rc);
    }
    v.appendChild(card);
  }

  // 设计产物勾选：一眼看出 PRD/ADR/requirements 等关键文档是否就位。
  const dh = document.createElement("div"); dh.className = "mut";
  dh.textContent = "设计产物"; dh.style.margin = "10px 0 4px"; v.appendChild(dh);
  const dul = document.createElement("ul"); dul.style.listStyle = "none"; dul.style.paddingLeft = "0";
  for (const [name, ok] of Object.entries(st.design_files || {})) {
    const li = document.createElement("li"); li.style.cursor = "default";
    li.textContent = (ok ? "✓ " : "✗ ") + name;
    li.style.color = ok ? "#3ecf8e" : "#8a90a0";
    dul.appendChild(li);
  }
  v.appendChild(dul);

  // 变更请求入口：开发完成后想改/加需求，从这里建 change-request 卡（change-guardian 先设计再执行）。
  const crh = document.createElement("div"); crh.className = "mut";
  crh.textContent = "提交变更请求（已交付后追加/修改需求）";
  crh.style.margin = "12px 0 4px"; v.appendChild(crh);
  const crRow = document.createElement("div"); crRow.className = "row";
  const crIn = document.createElement("input");
  crIn.id = "crInput"; crIn.placeholder = "描述要改/要加的需求…"; crIn.style.flex = "1";
  const crBtn = document.createElement("button"); crBtn.textContent = "提交变更";
  crRow.appendChild(crIn); crRow.appendChild(crBtn); v.appendChild(crRow);
  crBtn.onclick = submitChangeRequest;

  // QA 详情（若有）：原样 JSON，方便排查为何未放行。
  if (st.qa_status && Object.keys(st.qa_status).length) {
    const qh = document.createElement("div"); qh.className = "mut";
    qh.textContent = "QA 状态"; qh.style.margin = "12px 0 4px"; v.appendChild(qh);
    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(st.qa_status, null, 2);   // textContent，绝不解析
    v.appendChild(pre);
  }
}
function fmtBool(x){ return x === true ? "是" : x === false ? "否" : "—"; }

async function submitChangeRequest(){
  const inp = $("#crInput"); const change = (inp && inp.value || "").trim();
  if (!change) { alert("请先描述变更内容"); return; }
  if (!confirm("提交变更请求？\n\n平台会建一张 change-request 卡交给 change-guardian（先设计再执行），不会直接改代码。")) return;
  try {
    await api("/api/projects/" + encodeURIComponent(state.pid) + "/change-requests",
              "POST", { change });
    inp.value = "";
    alert("已提交变更请求，可在【进度看板】查看 change-guardian 的卡。");
  } catch (e) { alert("提交失败：" + e.message); }
}

// 进度看板：实时看每张卡（任务）由谁负责、什么状态。每 5 秒自动刷新（仅页面可见时）。
async function renderBoard(v, nav){
  v.innerHTML = "";
  const note = document.createElement("div"); note.className = "mut";
  note.style.marginBottom = "8px"; note.textContent = "每 5 秒自动刷新（页面可见时）";
  v.appendChild(note);
  const box = document.createElement("div"); box.id = "boardBox"; v.appendChild(box);
  await loadBoard();
  if (nav != null && state._nav !== nav) return;   // 已切走：别再起自动刷新（防定时器泄漏）
  startAutoRefresh(loadBoard);
}
async function loadBoard(){
  const box = $("#boardBox"); if (!box) return;
  try {
    const tasks = await api("/api/projects/" + encodeURIComponent(state.pid) + "/tasks");
    box.innerHTML = "";
    if (!Array.isArray(tasks) || !tasks.length) {
      box.textContent = "（暂无任务卡）"; box.className = "mut"; return;
    }
    box.className = "";
    for (const t of tasks) {
      const st = (t.status || "todo").toLowerCase();
      const row = document.createElement("div"); row.className = "row";
      row.style.cssText = "padding:6px 8px;border-bottom:1px solid #1a1d24;align-items:flex-start";
      const dot = document.createElement("span");
      dot.style.cssText = "width:9px;height:9px;border-radius:50%;flex:0 0 auto;margin-top:5px;background:"
        + (STATUS_COLOR[st] || "#8a90a0");
      row.appendChild(dot);
      const mid = document.createElement("div"); mid.style.flex = "1";
      const title = document.createElement("div"); title.textContent = t.title || "(无标题)";
      mid.appendChild(title);
      const sub = document.createElement("div"); sub.className = "mut"; sub.style.fontSize = "12px";
      sub.textContent = (t.assignee ? "@" + t.assignee : "未指派") + "　·　" + st;
      mid.appendChild(sub);
      row.appendChild(mid);
      box.appendChild(row);
    }
  } catch (e) { box.textContent = e.message; box.className = "err"; }
}

// 事件/审计页：一站式回溯"什么时候什么地方发生了什么"——控制平面动作 + 编排器阶段跃迁 + 错误。
async function renderAudit(v, nav){
  const d = await api("/api/projects/" + encodeURIComponent(state.pid) + "/audit");
  if (nav != null && state._nav !== nav) return;   // 过期渲染丢弃
  v.innerHTML = "";
  const bar = document.createElement("div"); bar.className = "row"; bar.style.marginBottom = "8px";
  const note = document.createElement("div"); note.className = "mut"; note.style.flex = "1";
  note.textContent = "审计事件（最新在前）：动作/阶段跃迁/续跑熔断/告警/错误。点标签重进即刷新。";
  bar.appendChild(note);
  // 一键诊断包：下载单个文本文件，可直接发研发小组排查（汇总事件+状态+日志+环境）。
  const dlBtn = document.createElement("button"); dlBtn.textContent = "⬇ 导出诊断包";
  dlBtn.onclick = () => downloadDiagnostics(dlBtn);
  bar.appendChild(dlBtn);
  v.appendChild(bar);
  if (!Array.isArray(d.events) || !d.events.length){
    const p = document.createElement("p"); p.className = "mut"; p.textContent = "（暂无事件）";
    v.appendChild(p); return;
  }
  for (const e of d.events){
    const isErr = e.result === "error" || e.action === "error";
    const row = document.createElement("div");
    row.style.cssText = "padding:6px 8px;border-bottom:1px solid #1a1d24";
    const head = document.createElement("div");
    const badge = document.createElement("span");
    badge.textContent = e.action || "?";
    badge.style.cssText = "font-weight:600;color:" + (isErr ? "#ff5d5d" : "#7db4ff");
    head.appendChild(badge);
    const who = document.createElement("span"); who.className = "mut";
    who.style.marginLeft = "8px"; who.style.fontSize = "12px";
    who.textContent = "@" + (e.actor || "?") + "　·　" + (e.ts || "");
    head.appendChild(who);
    row.appendChild(head);
    if (e.detail && typeof e.detail === "object" && Object.keys(e.detail).length){
      const det = document.createElement("div"); det.className = "mut"; det.style.fontSize = "12px";
      det.textContent = JSON.stringify(e.detail);   // textContent：绝不解析
      row.appendChild(det);
    }
    v.appendChild(row);
  }
}

// 导出诊断包：fetch（带 X-Token 头，非 URL）→ 拿纯文本 → Blob 下载。CSP connect-src 'self' 允许。
async function downloadDiagnostics(btn){
  const old = btn.textContent; btn.disabled = true; btn.textContent = "生成中…";
  try {
    const r = await fetch("/api/projects/" + encodeURIComponent(state.pid) + "/diagnostics",
                          { headers: { "X-Token": state.token } });
    if (!r.ok) {
      let d = ""; try { d = (await r.json()).detail || ""; } catch (e) {}
      throw new Error(r.status + (d ? ": " + d : ""));
    }
    const text = await r.text();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([text], { type: "text/plain" }));
    a.download = "diagnostics-" + state.pid + ".txt";
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (e) { alert("导出失败：" + e.message); }
  finally { btn.disabled = false; btn.textContent = old; }
}

// 与 CEO 多轮对话：左侧选项目后，在此发需求/沟通。CEO 是唯一对话入口（设计目标）。
async function renderChat(v){
  v.innerHTML = "";
  const log = document.createElement("div"); log.id = "chatLog";
  log.style.cssText = "white-space:pre-wrap;overflow:auto;max-height:62vh;border:1px solid #2a2f3a;"
    + "border-radius:6px;padding:12px;background:#0b0d12;margin-bottom:8px";
  v.appendChild(log);
  const row = document.createElement("div"); row.className = "row";
  const ta = document.createElement("textarea");
  ta.id = "chatInput"; ta.rows = 2; ta.style.flex = "1";
  ta.placeholder = "对 CEO 说需求/追问…（Ctrl+Enter 发送；CEO 较慢，请耐心等）";
  const btn = document.createElement("button"); btn.id = "chatSend"; btn.textContent = "发送";
  row.appendChild(ta); row.appendChild(btn); v.appendChild(row);
  // 与 CEO 对齐 core_need 后，点这里启动流水线（产品委员会→架构→dev→QA→release）。
  // 这是 CEO 对话 → 自动开发的桥；缺了它用户只能手写 requirements.yaml（真机 shi 即如此）。
  const confirmRow = document.createElement("div"); confirmRow.className = "row";
  const cbtn = document.createElement("button"); cbtn.id = "confirmPlan";
  cbtn.textContent = "✅ 确认需求并启动设计";
  cbtn.style.cssText = "background:#15482f;border-color:#3ecf8e;color:#d8ffe9";
  const cnote = document.createElement("span"); cnote.className = "mut";
  cnote.textContent = "与 CEO 谈定 core_need 后点此，平台自动跑完整流水线";
  confirmRow.appendChild(cbtn); confirmRow.appendChild(cnote); v.appendChild(confirmRow);
  cbtn.onclick = confirmPlan;
  btn.onclick = sendMessage;
  ta.addEventListener("keydown", e => { if (e.ctrlKey && e.key === "Enter") sendMessage(); });
  await loadConversation();
  ta.focus();
}
async function confirmPlan(){
  if (!confirm("确认需求并启动设计？\n\n这会让平台据当前对话/需求启动产品委员会 → 架构 → 开发 → QA → 发布的全自动流水线。请确保已与 CEO 谈定 core_need。")) return;
  const cbtn = $("#confirmPlan"); if (cbtn) { cbtn.disabled = true; cbtn.textContent = "启动中…"; }
  try {
    const d = await api("/api/projects/" + encodeURIComponent(state.pid) + "/confirm-plan", "POST", {});
    await loadConversation();
    if (cbtn) cbtn.textContent = d.status === "already-started" ? "已启动（流水线运行中）" : "✅ 已启动设计";
    switchTab("state");   // 切到状态页看推进（统一入口，同步高亮）
  } catch (e) {
    if (cbtn) { cbtn.disabled = false; cbtn.textContent = "✅ 确认需求并启动设计"; }
    alert("启动失败：" + e.message);
  }
}
async function loadConversation(){
  const log = $("#chatLog"); if (!log) return;
  try {
    const d = await api("/api/projects/" + encodeURIComponent(state.pid) + "/conversation");
    // textContent 渲染对话（含 AI 回复）——绝不解析 HTML，杜绝存储型 XSS
    log.textContent = d.messages.map(m => "[" + m.role + "] " + m.content).join("\n\n")
      || "(暂无对话，向 CEO 发第一条需求)";
    log.scrollTop = log.scrollHeight;
  } catch (e) { log.textContent = e.message; }
}
// 疑似"新业务/新需求"的措辞——平台是"一个项目=一个核心需求"，新业务应新建项目，
// 不该混进当前项目对话（否则污染本项目的 core_need 与流水线）。命中则二次确认。
const NEW_REQ_RE = /(新需求|新项目|新业务|另(外|起)|再(做|写|开发|来)(一?个)?|帮我(做|写|开发|搞)(一?个)?|做(一?个)|写(一?个)|开发(一?个)|换(个|成)|另一个)/;
async function sendMessage(){
  const ta = $("#chatInput"), btn = $("#chatSend");
  const msg = (ta.value || "").trim(); if (!msg) return;
  if (NEW_REQ_RE.test(msg)) {
    const go = confirm(
      "这看起来像一个【新需求/新业务】。\n\n本平台一个项目对应一个核心需求(core_need)——" +
      "新业务请点右上角【+ 新建项目】单独做，不要混进当前项目，否则会污染本项目的需求与流水线。\n\n" +
      "若这只是【完善当前项目】的需求，点“确定”继续发送；否则点“取消”去新建项目。");
    if (!go) return;
  }
  btn.disabled = true; const old = btn.textContent; btn.textContent = "发送中…";
  try {
    await api("/api/projects/" + encodeURIComponent(state.pid) + "/messages",
              "POST", { message: msg, session_id: "main" });
    ta.value = "";
    await loadConversation();
  } catch (e) {
    const log = $("#chatLog"); if (log) log.textContent += "\n\n[发送失败] " + e.message;
  } finally { btn.disabled = false; btn.textContent = old; }
}

for (const b of document.querySelectorAll(".tabs button")) {
  b.onclick = () => switchTab(b.dataset.tab);
}
async function createProject(){
  if (!state.token) { alert("请先填 token 连接"); return; }
  const id = (prompt("新建项目 ID（小写字母/数字/-/_，3–64 位）。\n一个项目对应一个核心需求；新业务用新项目：") || "").trim();
  if (!id) return;
  // 建项目要起 Hermes 实例 + 17 角色 + 等 CEO gateway 就绪，可能耗时近 1 分钟；
  // 给出明确进度，避免页面看起来"卡住没反应"。
  const btn = $("#newproj"), st = $("#status");
  btn.disabled = true;
  const oldTxt = st.textContent, oldCls = st.className;
  st.textContent = "创建项目中（首次启动 CEO，约需 1 分钟，请勿关闭）…"; st.className = "mut";
  try {
    await api("/api/projects", "POST", { project_id: id });
    state.pid = id;
    await loadProjects();   // 成功后把状态置回"已连接"
    switchTab("chat");   // 新项目直接进对话页（统一入口，同步高亮）
  } catch (e) {
    st.textContent = oldTxt; st.className = oldCls;
    alert("创建失败：" + e.message);
  } finally { btn.disabled = false; }
}
$("#newproj").onclick = createProject;
$("#connect").onclick = () => {
  state.token = $("#token").value.trim();
  sessionStorage.setItem("autocode_token", state.token);
  loadProjects();
};
// 启动：从 sessionStorage 恢复（不从 URL 取 token，避免进浏览器历史/代理日志）
state.token = sessionStorage.getItem("autocode_token") || "";
if (state.token) { $("#token").value = state.token; loadProjects(); }
</script>
</body>
</html>
